name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and pack without publishing to npm'
        type: boolean
        default: true

jobs:
  release:
    name: Lint / Build / Test / Publish
    runs-on: ubuntu-latest
    # Prevent concurrent releases
    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish (dry run)
        if: inputs.dry_run
        run: pnpm -r --filter './packages/**' publish --access public --no-git-checks --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: '!inputs.dry_run'
        run: pnpm -r --filter './packages/**' publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
