<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stewie SSR Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
      .header { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 1.5rem; }
      .todo-list { list-style: none; padding: 0; }
      .todo-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid #f5f5f5; }
      .todo-item.done .todo-text { text-decoration: line-through; opacity: 0.5; }
      .badge { font-size: 0.75rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: #eee; }
      .badge-high { background: #fee; color: #c00; }
      .badge-low { background: #eef; color: #00c; }
      .check-btn { margin-left: auto; font-size: 0.8rem; padding: 0.2rem 0.5rem; cursor: pointer; }
      .stats { display: flex; gap: 1rem; font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
      .high-priority-count { color: #c00; font-weight: bold; }
      .empty-state { text-align: center; padding: 2rem; color: #999; }
      .error { color: red; }
    </style>
  </head>
  <body>
    <div id="app"><!--ssr-outlet--></div>
    <script type="module" src="/src/client.tsx"></script>
  </body>
</html>
