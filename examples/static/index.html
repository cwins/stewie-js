<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stewie — Static Example</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .add-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .add-row input {
        flex: 1;
        padding: 0.4rem;
        font-size: 1rem;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0;
        border-bottom: 1px solid #eee;
      }
      li.done span {
        text-decoration: line-through;
        color: #aaa;
      }
      .filters {
        margin-top: 1rem;
        display: flex;
        gap: 0.5rem;
      }
      .filters button.active-filter {
        font-weight: bold;
      }
      .all-done {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!--
      In a real Stewie app you would run this through @stewie/vite, which injects
      the @jsxImportSource pragma and uses the DOM JSX runtime for zero-overhead
      fine-grained subscriptions.

      For this plain-HTML demo we call mount() + jsx() from the descriptor runtime
      directly — same reactive model, slightly more verbose.
    -->
    <script type="module">
      import { mountTodoApp } from './src/todo-app.js'
      mountTodoApp(document.getElementById('app'))
    </script>
  </body>
</html>
